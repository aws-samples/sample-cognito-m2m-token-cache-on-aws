AWSTemplateFormatVersion: '2010-09-09'
Description: 'Cognito OAuth2 Token Proxy with API Gateway Caching'

Parameters:
  CognitoDomain:
    Type: String
    Description: Your Cognito domain WITHOUT https:// (e.g., your-domain.auth.region.amazoncognito.com or custom domain)
  StageName:
    Type: String
    Default: 'dev'
    Description: Name of the API Gateway deployment stage
  CacheTtlInSeconds:
    Type: Number
    Default: 3600
    Description: Cache TTL in seconds (default 1 hour)
  CacheSize:
    Type: String
    Default: '0.5'
    AllowedValues: ['0.5', '1.6', '6.1', '13.5', '28.4', '58.2', '118', '237']
    Description: Cache size in GB

Resources:
  # CloudWatch Log Group for API Gateway Access Logging
  ApiGatewayAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/apigateway/${AWS::StackName}-access-logs'
      RetentionInDays: 90

  # IAM Role for API Gateway CloudWatch Logging
  ApiGatewayCloudWatchRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs'

  # Account-level setting to enable API Gateway CloudWatch logging
  ApiGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt ApiGatewayCloudWatchRole.Arn

  # Origin verify secret for WAF validation
  OriginVerifySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: 'Secret used by API Gateway to prove origin to WAF on Cognito'
      GenerateSecretString:
        SecretStringTemplate: '{}'
        GenerateStringKey: 'origin-verify-token'
        PasswordLength: 64
        ExcludePunctuation: true

  CognitoProxy:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: CognitoAuthProxy
      Description: Proxy to Cognito OAuth2 token endpoint with caching
      EndpointConfiguration:
        Types:
          - REGIONAL

  OAuth2Resource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CognitoProxy
      ParentId: !GetAtt CognitoProxy.RootResourceId
      PathPart: 'oauth2'

  TokenResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CognitoProxy
      ParentId: !Ref OAuth2Resource
      PathPart: 'token'

  TokenMethod:
    Type: AWS::ApiGateway::Method
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W59
            reason: 'AuthorizationType is NONE because the endpoint is an open proxy to Cognito. Authentication is handled by Cognito itself via client credentials.'
    Properties:
      RestApiId: !Ref CognitoProxy
      ResourceId: !Ref TokenResource
      HttpMethod: POST
      ApiKeyRequired: false
      AuthorizationType: NONE
      RequestParameters:
        method.request.header.Authorization: false
        method.request.header.Accept: false
      MethodResponses:
        - StatusCode: '200'
          ResponseModels:
            application/json: 'Empty'
      Integration:
        Type: HTTP
        IntegrationHttpMethod: POST
        Uri: !Sub 'https://${CognitoDomain}/oauth2/token'
        PassthroughBehavior: WHEN_NO_TEMPLATES
        CacheNamespace: !Ref TokenResource
        CacheKeyParameters:
          - 'integration.request.header.Authorization'
        RequestParameters:
          integration.request.header.Authorization: 'method.request.header.Authorization'
        RequestTemplates:
          application/x-www-form-urlencoded: |
            #if($input.params().header.containsKey("Authorization"))
            #set($context.requestOverride.header.Authorization = $input.params().header.get("Authorization"))
            #set($body = $input.body)
            #set($pairs = $body.split("&"))
            #set($hasScope = false)
            #set($scopeValue = "")
            #foreach($pair in $pairs)
            #set($kv = $pair.split("="))
            #if($kv[0] == "scope")
            #set($hasScope = true)
            #if($kv.size() > 1)
            #set($scopeValue = $kv[1])
            #end
            #end
            #end
            #if($hasScope)
            grant_type=client_credentials&scope=$scopeValue
            #else
            grant_type=client_credentials&scope=
            #end
            #elseif($input.params().querystring.containsKey("client_id") && $input.params().querystring.containsKey("client_secret"))
            #set($clientId = $input.params().querystring.get("client_id"))
            #set($clientSecret = $input.params().querystring.get("client_secret"))
            #set($credentials = "$clientId:$clientSecret")
            #set($encodedCreds = $util.base64Encode($credentials))
            #set($context.requestOverride.header.Authorization = "Basic $encodedCreds")
            #if($input.params().querystring.containsKey("scope"))
            grant_type=client_credentials&scope=$input.params().querystring.get("scope")
            #else
            grant_type=client_credentials&scope=
            #end
            #else
            #set($body = $input.body)
            #set($pairs = $body.split("&"))
            #set($clientId = "")
            #set($clientSecret = "")
            #set($hasScope = false)
            #set($scopeValue = "")
            #foreach($pair in $pairs)
            #set($kv = $pair.split("="))
            #if($kv[0] == "client_id")
            #set($clientId = $kv[1])
            #end
            #if($kv[0] == "client_secret")
            #set($clientSecret = $kv[1])
            #end
            #if($kv[0] == "scope")
            #set($hasScope = true)
            #if($kv.size() > 1)
            #set($scopeValue = $kv[1])
            #end
            #end
            #end
            #if($clientId && $clientSecret)
            #set($credentials = "$clientId:$clientSecret")
            #set($encodedCreds = $util.base64Encode($credentials))
            #set($context.requestOverride.header.Authorization = "Basic $encodedCreds")
            #end
            #if($hasScope)
            grant_type=client_credentials&scope=$scopeValue
            #else
            grant_type=client_credentials&scope=
            #end
            #end
            #set($context.requestOverride.header.Accept = "application/json")
        IntegrationResponses:
          - StatusCode: '200'

  ApiGatewayStage:
    Type: AWS::ApiGateway::Stage
    DependsOn: ApiGatewayAccount
    Properties:
      RestApiId: !Ref CognitoProxy
      DeploymentId: !Ref ApiGatewayDeployment
      StageName: !Ref StageName
      TracingEnabled: true
      AccessLogSetting:
        DestinationArn: !GetAtt ApiGatewayAccessLogGroup.Arn
        Format: '{"requestId":"$context.requestId","ip":"$context.identity.sourceIp","caller":"$context.identity.caller","user":"$context.identity.user","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","resourcePath":"$context.resourcePath","status":"$context.status","protocol":"$context.protocol","responseLength":"$context.responseLength"}'
      CacheClusterEnabled: true
      CacheClusterSize: !Ref CacheSize
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          CachingEnabled: false
          LoggingLevel: INFO
        - ResourcePath: '/oauth2/token'
          HttpMethod: 'POST'
          CachingEnabled: true
          CacheTtlInSeconds: !Ref CacheTtlInSeconds
          CacheDataEncrypted: true
          LoggingLevel: INFO

  ApiGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - TokenMethod
    Properties:
      RestApiId: !Ref CognitoProxy
      Description: 'Deployment for Cognito OAuth2 Token Proxy'

Outputs:
  ApiEndpoint:
    Description: 'API Gateway endpoint URL for the OAuth2 token proxy'
    Value: !Sub 'https://${CognitoProxy}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/oauth2/token'
  CacheClusterSize:
    Description: 'Cache cluster size'
    Value: !Ref CacheSize
  CacheTtl:
    Description: 'Cache TTL in seconds'
    Value: !Ref CacheTtlInSeconds
  OriginVerifySecretArn:
    Description: 'Secrets Manager ARN for the origin verify secret (used internally by WAF)'
    Value: !Ref OriginVerifySecret
